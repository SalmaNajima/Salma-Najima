<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyusunan Formulir</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 15px 0;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
        }
        .tab {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            background: #f9f9f9;
            cursor: pointer;
            font-weight: 500;
        }
        .tab.active {
            background: white;
            border-bottom: 3px solid #007bff;
            color: #007bff;
        }
        .tab-content {
            display: none;
            padding: 20px;
        }
        .tab-content.active {
            display: block;
        }
        label {
            display: block;
            margin: 15px 0 6px;
            font-weight: 500;
        }
        input[type="text"], input[type="email"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .radio-group {
            display: flex;
            gap: 25px;
            margin: 10px 0;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            margin-top: 25px;
            cursor: pointer;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #007bff;
            margin: 20px 0 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Penyusunan Formulir</h1>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="openTab(0)">Data Demografi</div>
            <div class="tab" onclick="openTab(1)">Data Bank</div>
            <div class="tab" onclick="openTab(2)">Data Transaksi Keuangan</div>
        </div>

        <form id="mainForm">
            <!-- Tab 1: Data Demografi -->
            <div id="tab0" class="tab-content active">
                <div class="section-title">Data Demografi</div>
                
                <label>Nama Pengguna:</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap">

                <label>Tanggal Lahir:</label>
                <input type="date" id="tgl_lahir">

                <label>Alamat:</label>
                <input type="text" id="alamat" placeholder="Alamat lengkap...">

                <label>No Telepon:</label>
                <input type="text" id="telepon" placeholder="Contoh: 08123456789">

                <label>Email:</label>
                <input type="email" id="email" placeholder="nama@email.com">

                <label>Tingkatan Pendidikan:</label>
                <select id="pendidikan">
                    <option value="">Pilih Pendidikan</option>
                    <option value="SD">SD</option>
                    <option value="SMP">SMP</option>
                    <option value="SMA">SMA/SMK</option>
                    <option value="D3">D3</option>
                    <option value="S1">S1</option>
                    <option value="S2">S2</option>
                    <option value="S3">S3</option>
                </select>
            </div>

            <!-- Tab 2: Data Bank -->
            <div id="tab1" class="tab-content">
                <div class="section-title">Data Bank</div>
                
                <label>Nama Bank:</label>
                <select id="nama_bank">
                    <option value="">Cari/Pilih Bank...</option>
                    <option value="BCA">BCA</option>
                    <option value="BNI">BNI</option>
                    <option value="BRI">BRI</option>
                    <option value="Mandiri">Mandiri</option>
                    <option value="BSI">BSI</option>
                    <option value="CIMB">CIMB Niaga</option>
                </select>

                <label>Nomor Rekening:</label>
                <input type="text" id="no_rekening" placeholder="Masukkan nomor rekening">
            </div>

            <!-- Tab 3: Data Transaksi Keuangan -->
            <div id="tab2" class="tab-content">
                <div class="section-title">Data Transaksi Keuangan</div>
                
                <label>Tanggal Transaksi:</label>
                <input type="date" id="tgl_transaksi">

                <label>Uraian Transaksi:</label>
                <input type="text" id="uraian" placeholder="Contoh: Bayar Listrik">

                <label>Jenis Transaksi:</label>
                <div class="radio-group">
                    <label><input type="radio" name="jenis" value="Debet"> Debet</label>
                    <label><input type="radio" name="jenis" value="Kredit"> Kredit</label>
                </div>
            </div>

            <button type="submit">Kirim Formulir</button>
        </form>
    </div>

    <script>
        function openTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelectorAll('.tab')[n].classList.add('active');
            document.getElementById('tab' + n).classList.add('active');
        }

        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ Formulir berhasil dikirim!');
            console.log('Data yang dikirim:', {
                nama: document.getElementById('nama').value,
                tgl_lahir: document.getElementById('tgl_lahir').value,
                alamat: document.getElementById('alamat').value,
                telepon: document.getElementById('telepon').value,
                email: document.getElementById('email').value,
                pendidikan: document.getElementById('pendidikan').value,
                nama_bank: document.getElementById('nama_bank').value,
                no_rekening: document.getElementById('no_rekening').value,
                tgl_transaksi: document.getElementById('tgl_transaksi').value,
                uraian: document.getElementById('uraian').value,
                jenis: document.querySelector('input[name="jenis"]:checked')?.value || ''
            });
        });
    </script>
</body>
</html>
