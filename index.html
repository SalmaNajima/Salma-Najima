<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Terhubung Spreadsheet</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}
.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}
h2 {
    text-align: center;
}
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}
.radio-group {
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">
<h2>Formulir Data</h2>

<form id="form">

<label>Nama</label>
<input type="text" id="nama" required>

<label>Tanggal Lahir</label>
<input type="date" id="tgl_lahir">

<label>Alamat</label>
<input type="text" id="alamat">

<label>No Telepon</label>
<input type="text" id="telepon">

<label>Email</label>
<input type="email" id="email">

<label>Pendidikan</label>
<select id="pendidikan">
<option value="">Pilih</option>
<option>SD</option>
<option>SMP</option>
<option>SMA</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
</select>

<label>Nama Bank</label>
<select id="nama_bank">
<option value="">Pilih</option>
<option>BCA</option>
<option>BRI</option>
<option>BNI</option>
<option>Mandiri</option>
<option>BSI</option>
</select>

<label>No Rekening</label>
<input type="text" id="no_rekening">

<label>Tanggal Transaksi</label>
<input type="date" id="tgl_transaksi">

<label>Uraian</label>
<input type="text" id="uraian">

<label>Jenis Transaksi</label>
<div class="radio-group">
<label><input type="radio" name="jenis" value="Debet"> Debet</label>
<label><input type="radio" name="jenis" value="Kredit"> Kredit</label>
</div>

<button type="submit">Kirim</button>

</form>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwHZG1EZAufiX2oFlF8tFGubs2fsMv-pULce23zn9tlfskz0aySYjUpDujKLBg5ha-S/exec"; // 🔴 GANTI DI SINI

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        nama: document.getElementById("nama").value,
        tgl_lahir: document.getElementById("tgl_lahir").value,
        alamat: document.getElementById("alamat").value,
        telepon: document.getElementById("telepon").value,
        email: document.getElementById("email").value,
        pendidikan: document.getElementById("pendidikan").value,
        nama_bank: document.getElementById("nama_bank").value,
        no_rekening: document.getElementById("no_rekening").value,
        tgl_transaksi: document.getElementById("tgl_transaksi").value,
        uraian: document.getElementById("uraian").value,
        jenis: document.querySelector('input[name="jenis"]:checked')?.value || ""
    };

    fetch(URL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(() => {
        alert("✅ Data berhasil dikirim ke Spreadsheet!");
        document.getElementById("form").reset();
    })
    .catch(err => {
        alert("❌ Gagal kirim data");
        console.error(err);
    });
});
</script>

</body>
</html>
